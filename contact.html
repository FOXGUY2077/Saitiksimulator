<!DOCTYPE html>
<html lang="ru">
<style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
    background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
    color: #e0e8ff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* контейнер для контента */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    width: 100%;
    flex: 1;
}

/* --- header --- */
.main-header {
    background: rgba(15, 25, 45, 0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(100, 150, 255, 0.3);
    padding: 0.8rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo span {
    font-size: 2rem;
}

.logo h1 {
    font-size: 1.6rem;
    background: linear-gradient(135deg, #c0e0ff, #7aa9ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.nav-links {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
}

.nav-links a {
    color: #cbd5f0;
    text-decoration: none;
    font-weight: 500;
    transition: 0.2s;
    padding: 6px 0;
    border-bottom: 2px solid transparent;
}

.nav-links a:hover,
.nav-links a.active {
    color: #7aa9ff;
    border-bottom-color: #3b82f6;
}

/* --- хлебные крошки --- */
.breadcrumbs {
    padding: 12px 0;
    font-size: 0.85rem;
    color: #8a9dcf;
    border-bottom: 1px solid rgba(100,150,255,0.2);
    margin-bottom: 1.5rem;
}

.breadcrumbs a {
    color: #8a9dcf;
    text-decoration: none;
}

.breadcrumbs a:hover {
    color: #3b82f6;
}

.breadcrumbs span {
    color: #cbd5f0;
}

/* --- карточки на главной --- */
.cards-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 2rem;
    justify-content: center;
    margin: 2rem 0;
}

.card {
    background: rgba(15, 25, 45, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 1.8rem;
    border: 1px solid rgba(100, 150, 255, 0.3);
    padding: 1.8rem;
    width: 300px;
    text-align: center;
    transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
}

.card-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.card h3 {
    margin-bottom: 0.8rem;
    color: #bbd9ff;
}

.card p {
    font-size: 0.9rem;
    color: #a0b5da;
    margin-bottom: 1.2rem;
}

.btn {
    display: inline-block;
    background: linear-gradient(90deg, #2563eb, #1e40af);
    padding: 8px 20px;
    border-radius: 2rem;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
    border: none;
    cursor: pointer;
}

.btn:hover {
    transform: scale(0.97);
    background: linear-gradient(90deg, #3b82f6, #1e3a8a);
}

/* --- форма обратной связи --- */
.form-container {
    max-width: 600px;
    margin: 0 auto;
    background: rgba(0, 0, 0, 0.4);
    border-radius: 2rem;
    padding: 2rem;
    border: 1px solid rgba(100,150,255,0.3);
}

.form-group {
    margin-bottom: 1.2rem;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
    color: #cfdfff;
}

.form-group input,
.form-group textarea {
    width: 100%;
    padding: 12px;
    border-radius: 1rem;
    background: #0f172a;
    border: 1px solid #2d3a5e;
    color: white;
    font-family: inherit;
    outline: none;
    transition: 0.2s;
}

.form-group input:focus,
.form-group textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 6px #3b82f6;
}

.form-group textarea {
    resize: vertical;
    min-height: 100px;
}

/* --- симуляторы (стили из предыдущей версии) --- */
.simulator-card {
    background: rgba(15, 25, 45, 0.65);
    backdrop-filter: blur(12px);
    border-radius: 2rem;
    border: 1px solid rgba(100, 150, 255, 0.25);
    padding: 1.8rem;
    box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
}
.dashboard {
    display: flex;
    flex-wrap: wrap;
    gap: 1.8rem;
}
.controls-panel {
    flex: 1.2;
    min-width: 260px;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 1.5rem;
    padding: 1.4rem;
}
.canvas-area {
    flex: 3;
    min-width: 500px;
}
canvas {
    width: 100%;
    background: #03060e;
    border-radius: 1.5rem;
    border: 1px solid rgba(59, 130, 246, 0.5);
    box-shadow: 0 12px 28px black;
}
.param {
    margin-bottom: 1.5rem;
}
.param label {
    display: flex;
    justify-content: space-between;
    color: #cfdfff;
    margin-bottom: 6px;
    font-size: 0.85rem;
}
input[type="range"] {
    width: 100%;
    height: 5px;
    appearance: none;
    background: #1e2a4a;
    border-radius: 5px;
    outline: none;
}
input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #3b82f6;
    cursor: pointer;
    box-shadow: 0 0 8px #3b82f6;
}
.value-display {
    background: #0f172ad9;
    padding: 2px 10px;
    border-radius: 24px;
    font-family: monospace;
    font-size: 0.8rem;
    color: #90cdf4;
}
.stats {
    background: #03060eaa;
    border-radius: 1.5rem;
    padding: 1rem;
    margin: 1rem 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}
.stat-card {
    background: #0a1020;
    border-radius: 1.2rem;
    padding: 8px 12px;
    text-align: center;
}
.stat-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: #7e93b5;
}
.stat-value {
    font-size: 1.3rem;
    font-weight: bold;
    font-family: monospace;
    color: #bbd9ff;
}
button {
    background: linear-gradient(90deg, #2563eb, #1e40af);
    border: none;
    padding: 10px 18px;
    border-radius: 2rem;
    font-weight: bold;
    color: white;
    width: 100%;
    margin-top: 8px;
    cursor: pointer;
    transition: 0.2s;
}
button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
button:hover:not(:disabled) {
    transform: scale(0.98);
}
.air-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0f172a;
    padding: 10px 16px;
    border-radius: 2rem;
    margin-bottom: 1rem;
}
.switch {
    position: relative;
    display: inline-block;
    width: 48px;
    height: 24px;
}
.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #334155;
    transition: 0.3s;
    border-radius: 34px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: white;
    transition: 0.3s;
    border-radius: 50%;
}
input:checked + .slider {
    background-color: #3b82f6;
}
input:checked + .slider:before {
    transform: translateX(24px);
}

/* --- footer --- */
.main-footer {
    background: rgba(10, 15, 30, 0.9);
    text-align: center;
    padding: 1.2rem;
    border-top: 1px solid rgba(100,150,255,0.2);
    font-size: 0.8rem;
    color: #8a9dcf;
    margin-top: auto;
}

/* --- адаптив под 360px --- */
@media (max-width: 768px) {
    .header-inner {
        flex-direction: column;
        text-align: center;
    }
    .nav-links {
        justify-content: center;
    }
    .dashboard {
        flex-direction: column;
    }
    .canvas-area {
        min-width: auto;
    }
    .simulator-card {
        padding: 1rem;
    }
    .controls-panel {
        min-width: auto;
    }
    .container {
        padding: 12px;
    }
    .cards-grid {
        flex-direction: column;
        align-items: center;
    }
    .card {
        width: 100%;
        max-width: 320px;
    }
}
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | Физическая песочница</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-inner">
            <div class="logo">
                <span>⚡🧪</span>
                <h1>Физическая песочница</h1>
            </div>
            <nav class="nav-links">
                <a href="index.html">Главная</a>
                <a href="ballistics.html">Снаряд</a>
                <a href="pendulum.html">Маятник</a>
                <a href="contact.html" class="active">Контакты</a>
                <a href="about.html">О проекте</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <div class="breadcrumbs">
            <a href="index.html">Главная</a> / <span>Контакты</span>
        </div>

        <div class="form-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">📬 Напишите нам</h2>
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="name">Ваше имя *</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Сообщение *</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Отправить сообщение</button>
                <p id="formStatus" style="margin-top: 1rem; text-align: center; color: #7aa9ff;"></p>
            </form>
        </div>
    </div>

    <footer class="main-footer">
        <p>🔬 Проект студента 2 курса Радковца Дмитрия Петровича | Физическое моделирование | 2026</p>
        <p>📧 alexander.paravozan@gmail.com | 🧑‍🎓 Группа 24ИТ-3</p>
    </footer>

    <script>
        document.getElementById('feedbackForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();
            const status = document.getElementById('formStatus');
            if (!name || !email || !message) {
                status.textContent = '❌ Заполните все поля!';
                status.style.color = '#ff8888';
                return;
            }
            if (!email.includes('@') || !email.includes('.')) {
                status.textContent = '❌ Введите корректный email';
                status.style.color = '#ff8888';
                return;
            }
            // Имитация отправки (можно заменить на реальный запрос)
            status.textContent = '✅ Спасибо! Ваше сообщение отправлено.';
            status.style.color = '#88ff88';
            this.reset();
            setTimeout(() => { status.textContent = ''; }, 3000);
        });
    </script>
</body>
</html>
